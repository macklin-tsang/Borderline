spring:
  application:
    name: borderline

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/borderline}
    username: ${DB_USERNAME:borderline}
    password: ${DB_PASSWORD:borderline}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 3000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}
  hmac:
    secret: ${HMAC_SECRET}
    key-version: ${HMAC_KEY_VERSION:1}
