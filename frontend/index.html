<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Borderline</title>
  <style>
    body { font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #0f0f0f; color: #e0e0e0; }
    .status { text-align: center; }
    .dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div class="status">
    <p><span class="dot"></span>Borderline scaffold running</p>
    <p style="color:#666; font-size:0.85em">React app initialized on Day 8</p>
  </div>
</body>
</html>
